<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MI ULTIMATE STORE | MUSLIM ISLAM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@400;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        /* ==========================================================================
           1. COMPREHENSIVE STYLE ARCHITECTURE (NETFLIX RED THEME)
           ==========================================================================
        */
        :root {
            --primary: #E50914;
            --primary-glow: rgba(229, 9, 20, 0.6);
            --bg-deep: #080808;
            --bg-surface: #141414;
            --bg-card: #1f1f1f;
            --text-gold: #ffcc00;
            --text-silver: #e0e0e0;
            --accent-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: 1px solid rgba(229, 9, 20, 0.3);
            --shadow-3d: 0 20px 40px rgba(0,0,0,0.8);
            --nav-height: 75px;
        }

        /* Full Screen & Layout */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        body { 
            background: var(--bg-deep); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* 2500+ Line Target: Detailed Animations */
        @keyframes liquid-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .premium-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a0505 0%, #080808 100%);
            z-index: -2;
        }

        /* ==========================================================================
           2. NAVIGATION & HEADER SYSTEM
           ==========================================================================
        */
        .mi-header {
            height: 80px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            position: sticky;
            top: 0;
            z-index: 2000;
            border-bottom: var(--border-glow);
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo-img {
            width: 55px; height: 55px;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            border: 2px solid var(--primary);
            transition: 0.5s;
        }

        .logo-img:hover { transform: rotate(360deg) scale(1.1); }

        .logo-text h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #fff, #E50914);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ==========================================================================
           3. ANALYTICS & DASHBOARD UI
           ==========================================================================
        */
        .analytics-strip {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px 6%;
            scrollbar-width: none;
        }

        .stat-card {
            background: var(--bg-surface);
            min-width: 150px;
            padding: 15px;
            border-radius: 15px;
            border-left: 4px solid var(--primary);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        .stat-card h4 { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-card p { font-size: 22px; font-weight: 800; font-family: 'Roboto Mono'; }

        /* ==========================================================================
           4. APP CARD SYSTEM (3D GRID)
           ==========================================================================
        */
        .main-container { padding: 0 6%; }

        .search-wrapper {
            margin: 20px 0;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid #333;
            padding: 20px 60px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .app-item {
            background: var(--bg-surface);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .app-item:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .app-item img {
            width: 90px; height: 90px;
            border-radius: 22px;
            margin-bottom: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .app-item h3 { font-size: 14px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .app-item .rating { font-size: 10px; color: var(--text-gold); }

        /* ==========================================================================
           5. DEEP VIEW (APP DETAILS)
           ==========================================================================
        */
        .detail-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 3000;
            overflow-y: auto;
            padding-bottom: 50px;
        }

        .hero-banner {
            height: 300px;
            background: linear-gradient(to bottom, rgba(229, 9, 20, 0.4), var(--bg-deep));
            display: flex;
            align-items: flex-end;
            padding: 30px 6%;
        }

        .app-meta-box {
            display: flex;
            gap: 25px;
            align-items: center;
            width: 100%;
        }

        .app-meta-box img {
            width: 120px; height: 120px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .meta-info h2 { font-size: 30px; font-weight: 800; }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding: 0 6%;
        }

        .download-btn {
            flex: 2;
            background: var(--primary);
            border: none;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 20px var(--primary-glow);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .share-btn {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        /* ==========================================================================
           6. ADMIN PANEL 2.0 (ANALYTICS & EDITING)
           ==========================================================================
        */
        .admin-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            display: none;
            padding: 20px;
            overflow-y: auto;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-form-box {
            background: var(--bg-surface);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .admin-list-box {
            background: var(--bg-surface);
            padding: 25px;
            border-radius: 20px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #888; }
        .input-group input, .input-group textarea {
            width: 100%; background: #080808; border: 1px solid #333;
            color: white; padding: 12px; border-radius: 8px;
        }

        /* ==========================================================================
           7. RATING & FEEDBACK SYSTEM
           ==========================================================================
        */
        .feedback-section {
            margin-top: 40px;
            padding: 0 6%;
        }

        .star-rating {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .star { font-size: 30px; color: #333; cursor: pointer; }
        .star.active { color: var(--text-gold); }

        .comment-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary);
        }

        /* Bottom Nav */
        .mi-bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 70px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 4000;
        }

        .nav-item { text-align: center; color: #777; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; display: block; }
        .nav-item span { font-size: 10px; font-weight: 600; }

    </style>
</head>
<body>

    <div class="premium-bg"></div>

    <header class="mi-header">
        <div class="logo-box" onclick="location.reload()">
            <img src="https://i.ibb.co/JR6R1CNV/file-00000000a26c7208993f599787b17b9d-removebg-preview.png" class="logo-img">
            <div class="logo-text">
                <h1>MI APP STORE</h1>
                <p style="font-size: 9px; color: #777;">BY MUSLIM ISLAM</p>
            </div>
        </div>
        <div class="header-tools">
            <button onclick="checkAdmin()" style="background:none; border:none; color:#444; font-size: 20px; cursor: pointer;">⚙️</button>
        </div>
    </header>

    <main id="app-content">
        <div class="analytics-strip">
            <div class="stat-card"><h4>Total Apps</h4><p id="stat-apps">0</p></div>
            <div class="stat-card"><h4>Downloads</h4><p id="stat-downloads">0</p></div>
            <div class="stat-card"><h4>Active Users</h4><p id="stat-users">1.2K</p></div>
        </div>

        <div class="main-container">
            <div class="search-wrapper">
                <input type="text" id="search-input" class="search-bar" placeholder="Search premium apks, tools..." onkeyup="filterApps()">
            </div>

            <h3 style="margin: 20px 0;">Premium Applications</h3>
            <div class="app-grid" id="app-display-grid">
                </div>
        </div>
    </main>

    <div id="detail-overlay" class="detail-view">
        <div class="hero-banner" id="detail-banner">
            <button onclick="closeDetails()" style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); border: none; color: white; padding: 10px; border-radius: 50%;">← Back</button>
            <div class="app-meta-box">
                <img id="det-icon" src="">
                <div class="meta-info">
                    <h2 id="det-title">App Name</h2>
                    <p id="det-dev" style="color: var(--primary);">Developer Name</p>
                    <p id="det-downloads" style="font-size: 12px; color: #aaa;">120K Downloads</p>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="download-btn" id="main-dl-btn" onclick="startDownload()">
                <span>🚀 Download Now</span>
            </button>
            <button class="share-btn" onclick="shareSpecificApp()">Share Link</button>
        </div>

        <div class="main-container" style="margin-top: 30px;">
            <h4>About this App</h4>
            <p id="det-desc" style="color: #bbb; font-size: 14px; margin-top: 10px;"></p>
            
            <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">

            <div class="feedback-section">
                <h4>Ratings & Reviews</h4>
                <div class="star-rating">
                    <span class="star" data-val="1">★</span>
                    <span class="star" data-val="2">★</span>
                    <span class="star" data-val="3">★</span>
                    <span class="star" data-val="4">★</span>
                    <span class="star" data-val="5">★</span>
                </div>
                <div class="input-group">
                    <textarea id="comment-text" placeholder="Write your review..."></textarea>
                    <button class="download-btn" style="padding: 10px; font-size: 14px; margin-top: 10px;" onclick="postComment()">Submit Review</button>
                </div>

                <div id="comments-list" style="margin-top: 20px;">
                    </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="admin-modal">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 30px;">MI STORE CONTROL PANEL</h2>
        <div class="admin-grid">
            <div class="admin-form-box">
                <h3 id="form-title">Add New App</h3>
                <input type="hidden" id="edit-id">
                <div class="input-group">
                    <label>App Name</label>
                    <input type="text" id="app-name-in">
                </div>
                <div class="input-group">
                    <label>Icon URL</label>
                    <input type="text" id="app-icon-in">
                </div>
                <div class="input-group">
                    <label>Direct Download Link (.apk)</label>
                    <input type="text" id="app-link-in">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="app-desc-in" rows="4"></textarea>
                </div>
                <button class="download-btn" style="width: 100%;" onclick="saveToFirebase()">Save App</button>
                <button onclick="closeAdmin()" style="width: 100%; margin-top: 10px; background: none; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px;">Exit Admin</button>
            </div>

            <div class="admin-list-box">
                <h3>Live App Inventory</h3>
                <div id="admin-inventory-list">
                    </div>
                <hr style="margin: 20px 0; border-color: #333;">
                <h3>Global Analytics</h3>
                <canvas id="analyticsChart" style="width: 100%; height: 200px;"></canvas>
            </div>
        </div>
    </div>

    <nav class="mi-bottom-nav">
        <div class="nav-item active"><i>🏠</i><span>Home</span></div>
        <div class="nav-item"><i>🔥</i><span>Trending</span></div>
        <div class="nav-item"><i>📦</i><span>My Apps</span></div>
        <div class="nav-item" onclick="checkAdmin()"><i>👤</i><span>Admin</span></div>
    </nav>

    <script>
        // --- 1. CONFIG & INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBbnU8DkthpYQMHOLLyj6M0cc05qXfjMcw",
            databaseURL: "https://ramadan-2385b-default-rtdb.firebaseio.com",
            projectId: "ramadan-2385b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentAppId = null;
        let allApps = {};

        // --- 2. CORE DATABASE LOGIC ---
        function saveToFirebase() {
            const id = document.getElementById('edit-id').value || Date.now();
            const data = {
                name: document.getElementById('app-name-in').value,
                icon: document.getElementById('app-icon-in').value,
                link: document.getElementById('app-link-in').value,
                desc: document.getElementById('app-desc-in').value,
                downloads: allApps[id]?.downloads || 0,
                rating: allApps[id]?.rating || 5
            };

            db.ref('apps/' + id).set(data).then(() => {
                alert("Success! Database Updated.");
                resetForm();
            });
        }

        function resetForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('app-name-in').value = '';
            document.getElementById('app-icon-in').value = '';
            document.getElementById('app-link-in').value = '';
            document.getElementById('app-desc-in').value = '';
            document.getElementById('form-title').innerText = "Add New App";
        }

        // --- 3. RENDERING & ANALYTICS ---
        db.ref('apps').on('value', (snap) => {
            allApps = snap.val() || {};
            const grid = document.getElementById('app-display-grid');
            const adminList = document.getElementById('admin-inventory-list');
            grid.innerHTML = '';
            adminList.innerHTML = '';

            let totalDownloads = 0;
            let appCount = 0;

            for(let id in allApps) {
                appCount++;
                totalDownloads += (allApps[id].downloads || 0);
                
                // Main Grid
                grid.innerHTML += `
                    <div class="app-item" onclick="openDetails('${id}')">
                        <img src="${allApps[id].icon}">
                        <h3>${allApps[id].name}</h3>
                        <div class="rating">⭐⭐⭐⭐⭐ (${allApps[id].downloads})</div>
                    </div>
                `;

                // Admin Inventory
                adminList.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:10px; margin-bottom:5px; border-radius:10px;">
                        <span>${allApps[id].name}</span>
                        <div>
                            <button onclick="editApp('${id}')" style="background:var(--accent-blue); border:none; padding:5px 10px; border-radius:5px; color:white;">Edit</button>
                            <button onclick="deleteApp('${id}')" style="background:var(--primary); border:none; padding:5px 10px; border-radius:5px; color:white;">Del</button>
                        </div>
                    </div>
                `;
            }

            document.getElementById('stat-apps').innerText = appCount;
            document.getElementById('stat-downloads').innerText = totalDownloads;
            
            // Check for deep links on load
            checkDeepLink();
        });

        // --- 4. DEEP LINKING SYSTEM (Sharing logic) ---
        function shareSpecificApp() {
            const shareUrl = window.location.origin + window.location.pathname + "?appid=" + currentAppId;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Deep Link copied! When people click this, they will land directly on this app page.");
            });
        }

        function checkDeepLink() {
            const params = new URLSearchParams(window.location.search);
            const appid = params.get('appid');
            if(appid && allApps[appid]) {
                openDetails(appid);
            }
        }

        // --- 5. DOWNLOAD TRACKING & LOCATION ---
        async function startDownload() {
            if(!currentAppId) return;

            // Simple Tracking logic
            const app = allApps[currentAppId];
            const newCount = (app.downloads || 0) + 1;
            
            // Increment download in DB
            db.ref('apps/' + currentAppId + '/downloads').set(newCount);

            // Fetch User Location (Public API)
            try {
                const geo = await fetch('https://ipapi.co/json/').then(res => res.json());
                const logId = Date.now();
                db.ref('logs/' + logId).set({
                    appName: app.name,
                    location: geo.city + ", " + geo.country_name,
                    ip: geo.ip,
                    time: new Date().toLocaleString()
                });
            } catch(e) { console.log("Location tracking failed."); }

            alert("Download starting...");
            window.location.href = app.link;
        }

        // --- 6. INTERFACE ACTIONS ---
        function openDetails(id) {
            currentAppId = id;
            const app = allApps[id];
            document.getElementById('det-title').innerText = app.name;
            document.getElementById('det-icon').src = app.icon;
            document.getElementById('det-desc').innerText = app.desc || "No description available.";
            document.getElementById('det-downloads').innerText = (app.downloads || 0) + " Successful Downloads";
            document.getElementById('detail-overlay').style.display = 'block';
            
            // Load Comments
            loadComments(id);
        }

        function closeDetails() {
            document.getElementById('detail-overlay').style.display = 'none';
            // Clean URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        function editApp(id) {
            const app = allApps[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('app-name-in').value = app.name;
            document.getElementById('app-icon-in').value = app.icon;
            document.getElementById('app-link-in').value = app.link;
            document.getElementById('app-desc-in').value = app.desc;
            document.getElementById('form-title').innerText = "Update App Settings";
        }

        function deleteApp(id) {
            if(confirm("Permanently remove this app?")) {
                db.ref('apps/' + id).remove();
            }
        }

        // --- 7. SECURITY & ADMIN ---
        function checkAdmin() {
            const p = prompt("Enter MUSLIM ISLAM Admin Pass:");
            if(p === "123456") {
                document.getElementById('admin-modal').style.display = 'block';
                initChart();
            } else {
                alert("Wrong Password!");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-modal').style.display = 'none';
        }

        // Chart.js Analytics
        function initChart() {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            const labels = Object.values(allApps).map(a => a.name);
            const data = Object.values(allApps).map(a => a.downloads);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Downloads by App',
                        data: data,
                        backgroundColor: '#E50914'
                    }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }

        function filterApps() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('.app-item');
            items.forEach(it => {
                const name = it.querySelector('h3').innerText.toLowerCase();
                it.style.display = name.includes(q) ? 'block' : 'none';
            });
        }

        // --- 8. FEEDBACK LOGIC ---
        function postComment() {
            const text = document.getElementById('comment-text').value;
            if(!text) return;
            const cid = Date.now();
            db.ref('comments/' + currentAppId + '/' + cid).set({
                text: text,
                user: "User_" + Math.floor(Math.random()*1000)
            });
            document.getElementById('comment-text').value = '';
        }

        function loadComments(id) {
            db.ref('comments/' + id).on('value', (snap) => {
                const list = document.getElementById('comments-list');
                list.innerHTML = '';
                const coms = snap.val() || {};
                for(let k in coms) {
                    list.innerHTML += `<div class="comment-card"><strong>${coms[k].user}</strong><p>${coms[k].text}</p></div>`;
                }
            });
        }

    </script>
</body>
</html>
